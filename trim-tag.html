<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Trimmer & Tagger</title>
    <!-- iOS PWA Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#09090b">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- LameJS for converting to mp3 -->
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        input[type="file"] {
            display: none;
        }

        .file-label {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-label:active {
            transform: scale(0.98);
        }

        /* Custom Audio Player Styling */
        audio {
            border-radius: 0.75rem;
            height: 40px;
        }

        audio::-webkit-media-controls-panel {
            background-color: #27272a;
            /* zinc-800 */
        }

        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #fff;
        }
    </style>
</head>

<body
    class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col font-sans selection:bg-green-500 selection:text-black">

    <!-- HEADER -->
    <header class="w-full flex justify-between items-center p-5 pt-[max(20px,env(safe-area-inset-top))] z-10">
        <a href="index.html"
            class="text-zinc-400 hover:text-zinc-300 text-xl p-5 -m-5 flex items-center transition-colors">&larr;</a>
        <span class="text-base font-semibold text-zinc-100">Trim & Tag</span>
    </header>

    <div class="flex-1 flex items-center justify-center p-4 w-full">
        <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-3xl p-6 shadow-2xl my-8">

            <div class="text-center mb-6">
                <i class="ph ph-scissors text-4xl text-green-500 mb-2 inline-block"></i>
                <h1 class="text-2xl font-bold tracking-tight">Trimmer & Tagger</h1>
                <p class="text-zinc-400 text-sm mt-1">Slice, Tag, and Convert to MP3</p>
            </div>

            <div class="space-y-6">
                <!-- 1. Audio File Upload -->
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">1. Select Audio (M4A/MP3)</label>
                    <label
                        class="file-label flex items-center justify-center w-full px-4 py-3 bg-zinc-800 border-2 border-dashed border-zinc-700 rounded-xl hover:border-green-500 hover:bg-zinc-800/80 group">
                        <i class="ph ph-upload-simple text-xl mr-2 text-zinc-400 group-hover:text-green-500"></i>
                        <span id="audioFileName" class="text-zinc-300 font-medium truncate max-w-[200px]">Choose a
                            file...</span>
                        <!-- Removed the strict accept attribute so iOS doesn't gray out your MP3! -->
                        <input type="file" id="audioFile">
                    </label>
                </div>

                <!-- 2. Audio Player & Trim Controls (Hidden until file is loaded) -->
                <div id="trimSection" class="hidden bg-zinc-950/50 p-4 rounded-2xl border border-zinc-800">
                    <label class="block text-sm font-medium text-zinc-400 mb-2">2. Find Your Cut Points</label>

                    <audio id="audioPreview" controls class="w-full mb-4"></audio>

                    <div class="grid grid-cols-2 gap-4">
                        <!-- Start Time -->
                        <div class="bg-zinc-800 p-3 rounded-xl">
                            <label class="block text-xs text-zinc-400 mb-1 font-bold">START TIME (Sec)</label>
                            <input type="number" id="startTime" value="0.00" step="0.1" min="0"
                                class="w-full bg-transparent text-white font-mono text-lg border-none focus:ring-0 p-0 mb-2 outline-none">
                            <button onclick="setStartTime()"
                                class="w-full bg-zinc-700 hover:bg-zinc-600 text-xs py-1.5 rounded-lg transition-colors flex items-center justify-center">
                                <i class="ph ph-crosshair mr-1"></i> Get from Player
                            </button>
                        </div>

                        <!-- End Time -->
                        <div class="bg-zinc-800 p-3 rounded-xl">
                            <label class="block text-xs text-zinc-400 mb-1 font-bold">END TIME (Sec)</label>
                            <input type="number" id="endTime" step="0.1" min="0"
                                class="w-full bg-transparent text-white font-mono text-lg border-none focus:ring-0 p-0 mb-2 outline-none">
                            <button onclick="setEndTime()"
                                class="w-full bg-zinc-700 hover:bg-zinc-600 text-xs py-1.5 rounded-lg transition-colors flex items-center justify-center">
                                <i class="ph ph-crosshair mr-1"></i> Get from Player
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 3. Cover Art & Details -->
                <div class="border-t border-zinc-800 pt-6">
                    <label class="block text-sm font-medium text-zinc-400 mb-2">3. Cover Art & Details</label>

                    <div class="flex items-center gap-4 mb-3">
                        <label
                            class="file-label flex-1 flex items-center justify-center px-4 py-3 bg-zinc-800 border-2 border-dashed border-zinc-700 rounded-xl hover:border-green-500 hover:bg-zinc-800/80 group">
                            <i class="ph ph-image text-xl mr-2 text-zinc-400 group-hover:text-green-500"></i>
                            <span id="imageFileName"
                                class="text-zinc-300 font-medium text-sm truncate max-w-[120px]">Cover
                                Image...</span>
                            <!-- Kept image accept attribute so it defaults to your photo gallery -->
                            <input type="file" id="coverImage" accept="image/jpeg, image/png">
                        </label>
                        <div id="imagePreviewContainer"
                            class="hidden h-12 w-12 rounded-lg overflow-hidden border border-zinc-700 shrink-0">
                            <img id="imagePreview" class="h-full w-full object-cover" src="" alt="Cover preview">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2">
                            <input type="text" id="songTitle" placeholder="Song Title"
                                class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white placeholder:text-zinc-500 focus:outline-none focus:border-green-500 transition-colors">
                        </div>
                        <div>
                            <input type="text" id="artistName" placeholder="Artist"
                                class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white placeholder:text-zinc-500 focus:outline-none focus:border-green-500 transition-colors">
                        </div>
                        <div>
                            <input type="text" id="albumName" placeholder="Album"
                                class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white placeholder:text-zinc-500 focus:outline-none focus:border-green-500 transition-colors">
                        </div>
                    </div>
                </div>

                <!-- 4. Action Button -->
                <button onclick="window.processAudio()" id="downloadBtn"
                    class="w-full mt-2 bg-green-500 hover:bg-green-400 text-zinc-950 font-bold py-4 px-6 rounded-xl flex items-center justify-center transition-all transform active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="ph ph-scissors text-xl mr-2"></i>
                    <span>Trim & Download MP3</span>
                </button>

                <!-- Message Display -->
                <div id="messageBox" class="hidden p-3 rounded-lg text-sm text-center font-medium mt-4 break-words">
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { ID3Writer } from 'https://cdn.jsdelivr.net/npm/browser-id3-writer@6.3.1/dist/browser-id3-writer.mjs';

        let audioDuration = 0;

        // UI: Audio File Selection & Player Setup
        document.getElementById('audioFile').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            // Basic check so they don't upload a PDF
            if (file.name.endsWith('.pdf') || file.type.startsWith('image/')) {
                showMessage("That doesn't look like an audio file!", 'error');
                return;
            }

            document.getElementById('audioFileName').textContent = file.name;

            // Set up the preview player
            const player = document.getElementById('audioPreview');
            const fileUrl = URL.createObjectURL(file);
            player.src = fileUrl;

            player.onloadedmetadata = function () {
                audioDuration = player.duration;
                document.getElementById('endTime').value = audioDuration.toFixed(2);
                document.getElementById('trimSection').classList.remove('hidden');
                showMessage('File ready. Play the track to find your cut points.', 'info');
            };
        });

        // UI: Cover Image Handling
        document.getElementById('coverImage').addEventListener('change', function (e) {
            const file = e.target.files[0];
            const fileNameSpan = document.getElementById('imageFileName');
            const previewContainer = document.getElementById('imagePreviewContainer');
            const previewImg = document.getElementById('imagePreview');

            if (file) {
                fileNameSpan.textContent = file.name;
                const reader = new FileReader();
                reader.onload = function (event) {
                    previewImg.src = event.target.result;
                    previewContainer.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            } else {
                fileNameSpan.textContent = 'Cover Image...';
                previewContainer.classList.add('hidden');
            }
        });

        // UI: Messaging
        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.textContent = text;
            box.classList.remove('hidden', 'bg-red-500/10', 'text-red-500', 'bg-green-500/10', 'text-green-500', 'bg-blue-500/10', 'text-blue-500');
            if (type === 'error') box.classList.add('bg-red-500/10', 'text-red-500');
            else if (type === 'info') box.classList.add('bg-blue-500/10', 'text-blue-500');
            else box.classList.add('bg-green-500/10', 'text-green-500');
        }

        // Expose functions globally for inline HTML onclick attributes
        window.setStartTime = function () {
            const player = document.getElementById('audioPreview');
            document.getElementById('startTime').value = player.currentTime.toFixed(2);
        };

        window.setEndTime = function () {
            const player = document.getElementById('audioPreview');
            document.getElementById('endTime').value = player.currentTime.toFixed(2);
        };

        window.processAudio = async function () {
            const audioInput = document.getElementById('audioFile').files[0];
            const imageInput = document.getElementById('coverImage').files[0];
            const title = document.getElementById('songTitle').value || 'Unknown Title';
            const artist = document.getElementById('artistName').value || 'Unknown Artist';
            const album = document.getElementById('albumName').value || 'Unknown Album';
            const btn = document.getElementById('downloadBtn');

            const startSec = parseFloat(document.getElementById('startTime').value) || 0;
            const endSec = parseFloat(document.getElementById('endTime').value) || audioDuration;

            if (!audioInput) {
                showMessage("Please select an audio file first!", 'error');
                return;
            }

            if (startSec >= endSec) {
                showMessage("Your Start Time must be before your End Time!", 'error');
                return;
            }

            btn.disabled = true;

            try {
                // 1. Read & Decode Audio
                showMessage("Reading file... (Do not close tab)", 'info');
                btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl mr-2"></i><span>Reading...</span>';
                const arrayBuffer = await audioInput.arrayBuffer();

                showMessage("Decoding audio...", 'info');
                let audioBuffer;
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    const audioContext = new AudioContext();
                    audioBuffer = await new Promise((resolve, reject) => {
                        audioContext.decodeAudioData(arrayBuffer, resolve,
                            (e) => reject(new Error(e ? (e.message || e.name) : "Format rejected"))
                        );
                    });
                } catch (decodeErr) {
                    throw new Error(`Decode Failed: ${decodeErr.message}`);
                }

                // 2. Slice the Audio Data based on Trim Inputs
                const sampleRate = audioBuffer.sampleRate;
                const channels = Math.min(2, audioBuffer.numberOfChannels);

                // Calculate exactly which array items to slice out
                const startOffset = Math.floor(Math.max(0, startSec) * sampleRate);
                const endOffset = Math.floor(Math.min(endSec, audioBuffer.duration) * sampleRate);

                // Extract only the selected portion
                const fullLeft = audioBuffer.getChannelData(0);
                const fullRight = channels > 1 ? audioBuffer.getChannelData(1) : null;

                const left = fullLeft.subarray(startOffset, endOffset);
                const right = channels > 1 ? fullRight.subarray(startOffset, endOffset) : null;

                // 3. Convert Sliced Portion to MP3
                showMessage("Converting slice to MP3...", 'info');
                await new Promise(r => setTimeout(r, 50));

                const mp3encoder = new lamejs.Mp3Encoder(channels, sampleRate, 192);
                const sampleBlockSize = 1152;
                let mp3Data = [];

                const leftInt16 = new Int16Array(sampleBlockSize);
                const rightInt16 = channels > 1 ? new Int16Array(sampleBlockSize) : null;

                for (let i = 0; i < left.length; i += sampleBlockSize) {
                    const chunkLen = Math.min(sampleBlockSize, left.length - i);

                    for (let j = 0; j < chunkLen; j++) {
                        leftInt16[j] = left[i + j] < 0 ? left[i + j] * 32768 : left[i + j] * 32767;
                        if (channels > 1) {
                            rightInt16[j] = right[i + j] < 0 ? right[i + j] * 32768 : right[i + j] * 32767;
                        }
                    }

                    const leftChunk = chunkLen === sampleBlockSize ? leftInt16 : leftInt16.subarray(0, chunkLen);

                    let mp3buf;
                    if (channels === 1) {
                        mp3buf = mp3encoder.encodeBuffer(leftChunk);
                    } else {
                        const rightChunk = chunkLen === sampleBlockSize ? rightInt16 : rightInt16.subarray(0, chunkLen);
                        mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
                    }

                    if (mp3buf.length > 0) mp3Data.push(new Int8Array(mp3buf));

                    if (i % (sampleBlockSize * 150) === 0) {
                        const progress = Math.round((i / left.length) * 100);
                        btn.innerHTML = `<i class="ph ph-spinner animate-spin text-xl mr-2"></i><span>Converting Slice... ${progress}%</span>`;
                        await new Promise(r => setTimeout(r, 0));
                    }
                }

                const flushBuf = mp3encoder.flush();
                if (flushBuf.length > 0) mp3Data.push(new Int8Array(flushBuf));

                const totalLength = mp3Data.reduce((acc, curr) => acc + curr.length, 0);
                const combinedMp3 = new Uint8Array(totalLength);
                let offset = 0;
                for (let chunk of mp3Data) {
                    combinedMp3.set(chunk, offset);
                    offset += chunk.length;
                }

                // 4. Tag the new MP3
                showMessage("Applying cover art & tags...", 'info');
                btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl mr-2"></i><span>Tagging...</span>';
                await new Promise(r => setTimeout(r, 50));

                const writer = new ID3Writer(combinedMp3.buffer);
                writer.setFrame('TIT2', title)
                    .setFrame('TPE1', [artist])
                    .setFrame('TALB', album);

                if (imageInput) {
                    const imageBuffer = await imageInput.arrayBuffer();
                    writer.setFrame('APIC', {
                        type: 3,
                        data: imageBuffer,
                        description: 'Cover'
                    });
                }

                writer.addTag();
                const taggedBlob = new Blob([writer.arrayBuffer], { type: 'audio/mp3' });
                const url = URL.createObjectURL(taggedBlob);

                // 5. Trigger download
                const downloadLink = document.createElement('a');
                downloadLink.href = url;
                downloadLink.download = `${title} - ${artist}.mp3`.replace(/Unknown/g, '').trim() || 'Trimmed_Track.mp3';
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                URL.revokeObjectURL(url);

                showMessage("Success! File trimmed, tagged, and downloaded.", 'success');
            } catch (error) {
                showMessage(`ERROR: ${error.message || error}`, 'error');
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="ph ph-scissors text-xl mr-2"></i><span>Trim & Download MP3</span>';
            }
        }
    </script>
</body>

</html>
