<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trim & Tag</title>

    <!-- iOS PWA Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trim & Tag">
    <meta name="theme-color" content="#09090b">
    <link rel="manifest" href="manifest.json">

    <!-- LameJS for converting to MP3 -->
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
    <!-- jsmediatags for reading existing tags -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.7/jsmediatags.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* ── Base & Reset ── */
        html {
            background-color: #09090b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #09090b;
            color: #f4f4f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Safe area notch fill */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: env(safe-area-inset-top, 0);
            background-color: #09090b;
            z-index: 99999;
            pointer-events: none;
        }

        ::selection {
            background-color: #22c55e;
            color: #000;
        }

        /* ── Header ── */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            z-index: 10;
        }

        .back-link {
            color: #a1a1aa;
            text-decoration: none;
            font-size: 20px;
            padding: 20px;
            margin: -20px;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .back-link:active {
            color: #d4d4d8;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: #f4f4f5;
        }

        /* ── Main Container ── */
        .main-wrap {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 16px;
            width: 100%;
        }

        .card {
            width: 100%;
            max-width: 448px;
            background-color: #18181b;
            border: 1px solid #27272a;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 16px 0 32px 0;
        }

        /* ── Title Block ── */
        .title-block {
            text-align: center;
            margin-bottom: 24px;
        }

        .title-icon {
            font-size: 36px;
            color: #22c55e;
            margin-bottom: 8px;
            display: inline-block;
        }

        .title-block h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .title-block p {
            color: #a1a1aa;
            font-size: 14px;
            margin-top: 4px;
        }

        /* ── Sections ── */
        .sections {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .section-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #a1a1aa;
            margin-bottom: 8px;
        }

        /* ── File Upload Buttons ── */
        input[type="file"] {
            display: none;
        }

        .file-label {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px 16px;
            background-color: #27272a;
            border: 2px dashed #3f3f46;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .file-label:active {
            transform: scale(0.98);
        }

        .file-label:hover {
            border-color: #22c55e;
            background-color: rgba(39, 39, 42, 0.8);
        }

        .file-label .icon {
            font-size: 20px;
            margin-right: 8px;
            color: #a1a1aa;
            transition: color 0.2s;
        }

        .file-label:hover .icon {
            color: #22c55e;
        }

        .file-label .file-name {
            color: #d4d4d8;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }

        /* ── Trim Section ── */
        .trim-section {
            display: none;
            background-color: rgba(9, 9, 11, 0.5);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid #27272a;
        }

        .trim-section.visible {
            display: block;
        }

        audio {
            width: 100%;
            border-radius: 12px;
            height: 40px;
            margin-bottom: 16px;
        }

        audio::-webkit-media-controls-panel {
            background-color: #27272a;
        }

        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #fff;
        }

        .trim-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .trim-box {
            background-color: #27272a;
            padding: 12px;
            border-radius: 12px;
        }

        .trim-box label {
            display: block;
            font-size: 11px;
            color: #a1a1aa;
            margin-bottom: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .trim-box input[type="number"] {
            width: 100%;
            background: transparent;
            color: #fff;
            font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
            font-size: 18px;
            border: none;
            outline: none;
            padding: 0;
            margin-bottom: 8px;
            /* 16px minimum prevents iOS zoom — mono at 18px is fine */
        }

        .trim-btn {
            width: 100%;
            background-color: #3f3f46;
            color: #f4f4f5;
            border: none;
            font-size: 12px;
            padding: 6px 0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .trim-btn:hover {
            background-color: #52525b;
        }

        .trim-btn i {
            margin-right: 4px;
        }

        /* ── Cover Art & Details ── */
        .details-section {
            border-top: 1px solid #27272a;
            padding-top: 24px;
        }

        .cover-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .cover-row .file-label {
            flex: 1;
        }

        .cover-row .file-label .file-name {
            font-size: 14px;
            max-width: 120px;
        }

        .cover-preview-wrap {
            display: none;
            height: 48px;
            width: 48px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #3f3f46;
            flex-shrink: 0;
        }

        .cover-preview-wrap.visible {
            display: block;
        }

        .cover-preview-wrap img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }

        .tag-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .tag-grid .full-width {
            grid-column: 1 / -1;
        }

        .tag-input {
            width: 100%;
            background-color: #27272a;
            border: 1px solid #3f3f46;
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 16px;
            /* 16px prevents iOS zoom */
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .tag-input::placeholder {
            color: #71717a;
        }

        .tag-input:focus {
            border-color: #22c55e;
        }

        /* ── Action Button ── */
        .action-btn {
            width: 100%;
            margin-top: 8px;
            background-color: #22c55e;
            color: #09090b;
            font-weight: 700;
            font-size: 16px;
            font-family: inherit;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .action-btn:hover {
            background-color: #4ade80;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .action-btn i {
            font-size: 20px;
            margin-right: 8px;
        }

        /* ── Message Box ── */
        .msg-box {
            display: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
            margin-top: 16px;
            word-break: break-word;
        }

        .msg-box.visible {
            display: block;
        }

        .msg-box.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .msg-box.info {
            background-color: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }

        .msg-box.success {
            background-color: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }

        /* ── Result Panel (shown after processing) ── */
        .result-panel {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background-color: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 16px;
            text-align: center;
        }

        .result-panel.visible {
            display: block;
        }

        .result-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            text-align: left;
        }

        .result-cover {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            object-fit: cover;
            background-color: #27272a;
            flex-shrink: 0;
        }

        .result-info h3 {
            font-size: 15px;
            font-weight: 600;
            color: #f4f4f5;
            margin-bottom: 2px;
        }

        .result-info p {
            font-size: 13px;
            color: #a1a1aa;
        }

        .result-audio {
            width: 100%;
            border-radius: 8px;
            height: 36px;
            margin-bottom: 12px;
        }

        .result-audio::-webkit-media-controls-panel {
            background-color: #27272a;
        }

        .result-audio::-webkit-media-controls-current-time-display,
        .result-audio::-webkit-media-controls-time-remaining-display {
            color: #fff;
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            background-color: #22c55e;
            color: #09090b;
        }

        .save-btn:active {
            transform: scale(0.98);
        }

        .save-btn:hover {
            background-color: #4ade80;
        }

        .save-hint {
            font-size: 12px;
            color: #71717a;
            margin-top: 8px;
        }

        /* ── Spinner animation ── */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinning {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <a href="index.html" class="back-link">&larr;</a>
        <span class="header-title">Trim & Tag</span>
    </header>

    <div class="main-wrap">
        <div class="card">

            <div class="title-block">
                <i class="ph ph-scissors title-icon"></i>
                <h1>Trimmer & Tagger</h1>
                <p>Slice, Tag, and Convert to MP3</p>
            </div>

            <div class="sections">
                <!-- 1. Audio File Upload -->
                <div>
                    <label class="section-label">1. Select Audio (Any Format)</label>
                    <label class="file-label" id="audioFileLabel">
                        <i class="ph ph-upload-simple icon"></i>
                        <span id="audioFileName" class="file-name">Choose a file...</span>
                        <input type="file" id="audioFile" accept="audio/*,video/*,.m4a,.mp3,.wav,.flac,.ogg,.opus,.aac,.wma,.webm">
                    </label>
                </div>

                <!-- 2. Audio Player & Trim Controls -->
                <div id="trimSection" class="trim-section">
                    <label class="section-label">2. Find Your Cut Points</label>
                    <audio id="audioPreview" controls></audio>
                    <div class="trim-grid">
                        <div class="trim-box">
                            <label>Start Time (Sec)</label>
                            <input type="number" id="startTime" value="0.00" step="0.1" min="0">
                            <button onclick="window.setStartTime()" class="trim-btn">
                                <i class="ph ph-crosshair"></i> Get from Player
                            </button>
                        </div>
                        <div class="trim-box">
                            <label>End Time (Sec)</label>
                            <input type="number" id="endTime" step="0.1" min="0">
                            <button onclick="window.setEndTime()" class="trim-btn">
                                <i class="ph ph-crosshair"></i> Get from Player
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 3. Cover Art & Details -->
                <div class="details-section">
                    <label class="section-label">3. Cover Art & Details</label>

                    <div class="cover-row">
                        <label class="file-label">
                            <i class="ph ph-image icon"></i>
                            <span id="imageFileName" class="file-name">Cover Image...</span>
                            <input type="file" id="coverImage" accept="image/jpeg, image/png">
                        </label>
                        <div id="imagePreviewContainer" class="cover-preview-wrap">
                            <img id="imagePreview" src="" alt="Cover preview">
                        </div>
                    </div>

                    <div class="tag-grid">
                        <div class="full-width">
                            <input type="text" id="songTitle" placeholder="Song Title" class="tag-input">
                        </div>
                        <div>
                            <input type="text" id="artistName" placeholder="Artist" class="tag-input">
                        </div>
                        <div>
                            <input type="text" id="albumName" placeholder="Album" class="tag-input">
                        </div>
                    </div>
                </div>

                <!-- 4. Action Button -->
                <button onclick="window.processAudio()" id="downloadBtn" class="action-btn">
                    <i class="ph ph-scissors"></i>
                    <span>Trim & Download MP3</span>
                </button>

                <!-- Message Display -->
                <div id="messageBox" class="msg-box"></div>

                <!-- Result Panel (appears after processing) -->
                <div id="resultPanel" class="result-panel">
                    <div class="result-meta">
                        <img id="resultCover" class="result-cover" src="" alt="">
                        <div class="result-info">
                            <h3 id="resultTitle"></h3>
                            <p id="resultArtist"></p>
                        </div>
                    </div>
                    <audio id="resultAudio" controls class="result-audio"></audio>
                    <button id="saveBtn" class="save-btn">
                        <i class="ph ph-download-simple"></i>
                        <span id="saveBtnText">Save File</span>
                    </button>
                    <p class="save-hint" id="saveHint"></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { ID3Writer } from 'https://cdn.jsdelivr.net/npm/browser-id3-writer@6.3.1/dist/browser-id3-writer.mjs';

        let audioDuration = 0;

        // Store original tags read from the uploaded file
        let originalTags = { title: '', artist: '', album: '' };
        let originalCoverData = null; // { data: ArrayBuffer, format: string }
        let userReplacedCover = false; // Track if user explicitly chose a new cover

        // Detect iOS standalone mode
        const isStandalone = window.navigator.standalone === true
            || window.matchMedia('(display-mode: standalone)').matches;

        // ── Read existing tags from uploaded file ──
        function readExistingTags(file) {
            return new Promise((resolve) => {
                const jsmt = window.jsmediatags;
                if (!jsmt) {
                    console.error("jsmediatags is not loaded on window.");
                    resolve({ title: '', artist: '', album: '', picture: null });
                    return;
                }

                jsmt.read(file, {
                    onSuccess: function (result) {
                        console.log("Raw tags read from file:", result.tags);
                        const tags = result.tags || {};
                        
                        // ID3 tags can sometimes be weird. Check shortcuts first, then fallback to raw frames.
                        const safeExtract = (shortcut, frameCode) => {
                            if (tags[shortcut]) return tags[shortcut];
                            if (tags[frameCode] && tags[frameCode].data) {
                                // Sometimes raw frames are stored as arrays or objects
                                const data = tags[frameCode].data;
                                return Array.isArray(data) ? data.join(', ') : data;
                            }
                            return '';
                        };

                        const info = {
                            title: safeExtract('title', 'TIT2'),
                            artist: safeExtract('artist', 'TPE1'),
                            album: safeExtract('album', 'TALB'),
                            picture: null
                        };

                        // Extract cover art if present
                        if (tags.picture) {
                            const pic = tags.picture;
                            const byteArray = new Uint8Array(pic.data);
                            info.picture = {
                                data: byteArray.buffer,
                                format: pic.format || 'image/jpeg'
                            };
                        } else if (tags.APIC && tags.APIC.data && tags.APIC.data.data) {
                            // Fallback for raw APIC frame
                            const pic = tags.APIC.data;
                            const byteArray = new Uint8Array(pic.data);
                            info.picture = {
                                data: byteArray.buffer,
                                format: pic.format || 'image/jpeg'
                            };
                        }
                        
                        resolve(info);
                    },
                    onError: function (error) {
                        console.error("jsmediatags failed to parse tags:", error);
                        // Tags unreadable — that's fine, we proceed with blanks
                        resolve({ title: '', artist: '', album: '', picture: null });
                    }
                });
            });
        }

        // ── UI: Audio File Selection & Tag Reading ──
        document.getElementById('audioFile').addEventListener('change', async function (e) {
            const file = e.target.files[0];
            if (!file) return;

            // Basic check so they don't upload a PDF or image
            if (file.name.endsWith('.pdf') || (file.type.startsWith('image/') && !file.type.includes('gif'))) {
                showMessage("That doesn't look like an audio file!", 'error');
                return;
            }

            document.getElementById('audioFileName').textContent = file.name;

            // Read existing tags from the file
            showMessage('Reading file tags...', 'info');
            const tags = await readExistingTags(file);
            originalTags.title = tags.title;
            originalTags.artist = tags.artist;
            originalTags.album = tags.album;

            // Pre-fill the form fields with existing tags
            const titleField = document.getElementById('songTitle');
            const artistField = document.getElementById('artistName');
            const albumField = document.getElementById('albumName');

            if (tags.title) {
                titleField.value = tags.title;
                titleField.placeholder = tags.title;
            } else {
                titleField.value = '';
                titleField.placeholder = 'Song Title';
            }
            if (tags.artist) {
                artistField.value = tags.artist;
                artistField.placeholder = tags.artist;
            } else {
                artistField.value = '';
                artistField.placeholder = 'Artist';
            }
            if (tags.album) {
                albumField.value = tags.album;
                albumField.placeholder = tags.album;
            } else {
                albumField.value = '';
                albumField.placeholder = 'Album';
            }

            // Show existing cover art if present
            if (tags.picture && !userReplacedCover) {
                originalCoverData = tags.picture;
                const blob = new Blob([tags.picture.data], { type: tags.picture.format });
                const url = URL.createObjectURL(blob);
                document.getElementById('imagePreview').src = url;
                document.getElementById('imagePreviewContainer').classList.add('visible');
                document.getElementById('imageFileName').textContent = 'Embedded art';
            } else {
                originalCoverData = null;
            }

            // Set up the preview player
            const player = document.getElementById('audioPreview');
            const fileUrl = URL.createObjectURL(file);
            player.src = fileUrl;

            player.onloadedmetadata = function () {
                audioDuration = player.duration;
                document.getElementById('endTime').value = audioDuration.toFixed(2);
                document.getElementById('trimSection').classList.add('visible');
                showMessage('File ready. Play the track to find your cut points.', 'info');
            };

            // Hide any previous result panel
            document.getElementById('resultPanel').classList.remove('visible');
        });

        // ── UI: Cover Image Handling ──
        document.getElementById('coverImage').addEventListener('change', function (e) {
            const file = e.target.files[0];
            const fileNameSpan = document.getElementById('imageFileName');
            const previewContainer = document.getElementById('imagePreviewContainer');
            const previewImg = document.getElementById('imagePreview');

            if (file) {
                userReplacedCover = true;
                fileNameSpan.textContent = file.name;
                const reader = new FileReader();
                reader.onload = function (event) {
                    previewImg.src = event.target.result;
                    previewContainer.classList.add('visible');
                }
                reader.readAsDataURL(file);
            } else {
                fileNameSpan.textContent = 'Cover Image...';
                previewContainer.classList.remove('visible');
                userReplacedCover = false;
            }
        });

        // ── UI: Messaging ──
        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.textContent = text;
            box.className = 'msg-box visible ' + type;
        }

        // ── Expose functions globally for onclick ──
        window.setStartTime = function () {
            const player = document.getElementById('audioPreview');
            document.getElementById('startTime').value = player.currentTime.toFixed(2);
        };

        window.setEndTime = function () {
            const player = document.getElementById('audioPreview');
            document.getElementById('endTime').value = player.currentTime.toFixed(2);
        };

        // ── Main Processing ──
        window.processAudio = async function () {
            const audioInput = document.getElementById('audioFile').files[0];
            const imageInput = document.getElementById('coverImage').files[0];

            // Use field value if present, otherwise fall back to original tag, otherwise empty
            const titleField = document.getElementById('songTitle').value;
            const artistField = document.getElementById('artistName').value;
            const albumField = document.getElementById('albumName').value;

            const title = titleField || originalTags.title || '';
            const artist = artistField || originalTags.artist || '';
            const album = albumField || originalTags.album || '';

            const btn = document.getElementById('downloadBtn');
            const startSec = parseFloat(document.getElementById('startTime').value) || 0;
            const endSec = parseFloat(document.getElementById('endTime').value) || audioDuration;

            if (!audioInput) {
                showMessage("Please select an audio file first!", 'error');
                return;
            }

            if (startSec >= endSec) {
                showMessage("Your Start Time must be before your End Time!", 'error');
                return;
            }

            btn.disabled = true;

            try {
                btn.innerHTML = '<i class="ph ph-spinner spinning"></i><span>Reading...</span>';
                showMessage("Reading file...", 'info');
                const arrayBuffer = await audioInput.arrayBuffer();

                // ── Fast path: MP3 with no trim needed ──
                // No decode, no re-encode, just slap new tags on the original bytes.
                const isMp3 = audioInput.type === 'audio/mpeg'
                    || audioInput.name.toLowerCase().endsWith('.mp3');
                const noTrim = Math.abs(startSec) < 0.01
                    && Math.abs(endSec - audioDuration) < 0.5;

                let mp3Buffer; // final ArrayBuffer to tag

                if (isMp3 && noTrim) {
                    // Already MP3, nothing to trim — skip decode/encode entirely
                    showMessage("MP3 detected — skipping re-encode...", 'info');
                    await new Promise(r => setTimeout(r, 30));
                    mp3Buffer = arrayBuffer;

                } else {
                    // ── Slow path: decode → slice → LameJS encode ──
                    showMessage("Decoding audio...", 'info');
                    let audioBuffer;
                    try {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        const audioContext = new AudioContext();
                        audioBuffer = await new Promise((resolve, reject) => {
                            audioContext.decodeAudioData(arrayBuffer, resolve,
                                (e) => reject(new Error(e ? (e.message || e.name) : "Format rejected"))
                            );
                        });
                    } catch (decodeErr) {
                        throw new Error(`Decode Failed: ${decodeErr.message}`);
                    }

                    const sampleRate = audioBuffer.sampleRate;
                    const channels = Math.min(2, audioBuffer.numberOfChannels);
                    const startOffset = Math.floor(Math.max(0, startSec) * sampleRate);
                    const endOffset = Math.floor(Math.min(endSec, audioBuffer.duration) * sampleRate);

                    const fullLeft = audioBuffer.getChannelData(0);
                    const fullRight = channels > 1 ? audioBuffer.getChannelData(1) : null;
                    const left = fullLeft.subarray(startOffset, endOffset);
                    const right = channels > 1 ? fullRight.subarray(startOffset, endOffset) : null;

                    showMessage(noTrim ? "Converting to MP3..." : "Trimming & converting to MP3...", 'info');
                    btn.innerHTML = '<i class="ph ph-spinner spinning"></i><span>Converting... 0%</span>';
                    await new Promise(r => setTimeout(r, 30));

                    const mp3encoder = new lamejs.Mp3Encoder(channels, sampleRate, 192);
                    const sampleBlockSize = 1152;
                    const mp3Data = [];
                    const leftInt16 = new Int16Array(sampleBlockSize);
                    const rightInt16 = channels > 1 ? new Int16Array(sampleBlockSize) : null;

                    // Yield once at halfway for UI update — no need for the old frequent
                    // canvas workaround yield since we have full PWA memory
                    const halfwayMark = Math.floor(left.length / 2 / sampleBlockSize) * sampleBlockSize;

                    for (let i = 0; i < left.length; i += sampleBlockSize) {
                        const chunkLen = Math.min(sampleBlockSize, left.length - i);
                        for (let j = 0; j < chunkLen; j++) {
                            leftInt16[j] = left[i + j] < 0 ? left[i + j] * 32768 : left[i + j] * 32767;
                            if (channels > 1) {
                                rightInt16[j] = right[i + j] < 0 ? right[i + j] * 32768 : right[i + j] * 32767;
                            }
                        }
                        const leftChunk = chunkLen === sampleBlockSize ? leftInt16 : leftInt16.subarray(0, chunkLen);
                        let mp3buf;
                        if (channels === 1) {
                            mp3buf = mp3encoder.encodeBuffer(leftChunk);
                        } else {
                            const rightChunk = chunkLen === sampleBlockSize ? rightInt16 : rightInt16.subarray(0, chunkLen);
                            mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
                        }
                        if (mp3buf.length > 0) mp3Data.push(new Int8Array(mp3buf));

                        if (i === halfwayMark) {
                            btn.innerHTML = '<i class="ph ph-spinner spinning"></i><span>Converting... 50%</span>';
                            await new Promise(r => setTimeout(r, 0));
                        }
                    }

                    const flushBuf = mp3encoder.flush();
                    if (flushBuf.length > 0) mp3Data.push(new Int8Array(flushBuf));

                    const totalLength = mp3Data.reduce((acc, curr) => acc + curr.length, 0);
                    const combinedMp3 = new Uint8Array(totalLength);
                    let offset = 0;
                    for (const chunk of mp3Data) {
                        combinedMp3.set(chunk, offset);
                        offset += chunk.length;
                    }
                    mp3Buffer = combinedMp3.buffer;
                }

                // ── Tag the MP3 ──
                showMessage("Applying tags...", 'info');
                btn.innerHTML = '<i class="ph ph-spinner spinning"></i><span>Tagging...</span>';
                await new Promise(r => setTimeout(r, 30));

                const writer = new ID3Writer(mp3Buffer);
                if (title) writer.setFrame('TIT2', title);
                if (artist) writer.setFrame('TPE1', [artist]);
                if (album) writer.setFrame('TALB', album);

                if (imageInput) {
                    const imageBuffer = await imageInput.arrayBuffer();
                    writer.setFrame('APIC', { type: 3, data: imageBuffer, description: 'Cover' });
                } else if (originalCoverData) {
                    writer.setFrame('APIC', { type: 3, data: originalCoverData.data, description: 'Cover' });
                }

                writer.addTag();
                const taggedBlob = new Blob([writer.arrayBuffer], { type: 'audio/mpeg' });

                // ── Build filename ──
                let fileName = '';
                if (title && artist) {
                    fileName = `${title} - ${artist}.mp3`;
                } else if (title) {
                    fileName = `${title}.mp3`;
                } else {
                    fileName = `${audioInput.name.replace(/\.[^.]+$/, '')}.mp3`;
                }

                // ── Show result ──
                const blobUrl = URL.createObjectURL(taggedBlob);
                showResultPanel(taggedBlob, blobUrl, fileName, title, artist, imageInput);
                showMessage("Done! Your file is ready.", 'success');

            } catch (error) {
                showMessage(`ERROR: ${error.message || error}`, 'error');
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="ph ph-scissors"></i><span>Trim & Download MP3</span>';
            }
        };

        // ── Result Panel & Download Logic ──
        function showResultPanel(taggedBlob, blobUrl, fileName, title, artist, imageInput) {
            const panel = document.getElementById('resultPanel');
            const resultCover = document.getElementById('resultCover');
            const resultTitle = document.getElementById('resultTitle');
            const resultArtist = document.getElementById('resultArtist');
            const resultAudio = document.getElementById('resultAudio');
            const saveBtn = document.getElementById('saveBtn');
            const saveBtnText = document.getElementById('saveBtnText');
            const saveHint = document.getElementById('saveHint');

            // Show metadata
            resultTitle.textContent = title || fileName;
            resultArtist.textContent = artist || '';

            // Show cover art
            if (imageInput) {
                const reader = new FileReader();
                reader.onload = (e) => { resultCover.src = e.target.result; };
                reader.readAsDataURL(imageInput);
                resultCover.style.display = 'block';
            } else if (originalCoverData) {
                const blob = new Blob([originalCoverData.data], { type: originalCoverData.format });
                resultCover.src = URL.createObjectURL(blob);
                resultCover.style.display = 'block';
            } else {
                resultCover.style.display = 'none';
            }

            // Playback preview of the result
            resultAudio.src = blobUrl;

            // Configure save button — prefer Web Share API, fall back to <a download>
            const mp3File = new File([taggedBlob], fileName, { type: 'audio/mpeg' });
            const canUseShareAPI = navigator.canShare && navigator.canShare({ files: [mp3File] });

            if (canUseShareAPI) {
                saveBtnText.textContent = 'Save or Share';
                saveHint.textContent = 'Opens the share sheet — tap "Save to Files" to add to your library';
                saveBtn.onclick = async function () {
                    try {
                        await navigator.share({
                            files: [mp3File],
                            title: fileName
                        });
                    } catch (err) {
                        // User cancelled — not an error
                        if (err.name !== 'AbortError') console.error(err);
                    }
                };
            } else {
                // Fallback: standard <a download> for desktop / non-supporting browsers
                saveBtnText.textContent = 'Download ' + fileName;
                saveHint.textContent = '';
                saveBtn.onclick = function () {
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                };
            }

            panel.classList.add('visible');

            // Scroll to the result
            setTimeout(() => {
                panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }
    </script>

    <!-- Standalone navigation fix: prevent links kicking to Safari -->
    <script>
        document.addEventListener("click", function (e) {
            var a = e.target.closest("a");
            if (a && a.href && a.href.includes(window.location.hostname)) {
                e.preventDefault();
                window.location.href = a.href;
            }
        });
    </script>
</body>

</html>
