<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f4f8fb" id="metaTheme">
    <title>Alphabets</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Jost:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');

        /* ===== RESET ===== */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 0; }

        body {
            min-height: 100vh; min-height: 100dvh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            transition: background-color 0.6s ease, color 0.6s ease;
        }

        /* ===== GREEK THEME — Mediterranean yoghurt pot ===== */
        body.theme-greek {
            --bg: #f0f5fa; --bg-card: #ffffff; --bg-input: #e8eff6;
            --text: #1a2d42; --text-sub: #5e7d99; --text-muted: #9cb3c9;
            --accent: #0d5eaf; --accent-soft: rgba(13,94,175,0.10);
            --separator: #cddaea; --card-radius: 16px;
            --card-shadow: 0 2px 14px rgba(13,94,175,0.07);
            --font-ui: 'Outfit', -apple-system, sans-serif;
            --letter-size: 2.4rem;
            background: var(--bg); color: var(--text); font-family: var(--font-ui);
        }
        body.theme-greek.ancient {
            --bg: #f5f0e4; --bg-card: #faf6ee; --bg-input: #eee7d8;
            --text: #2a2218; --text-sub: #7a6e5a; --text-muted: #a89c88;
            --accent: #b8860b; --accent-soft: rgba(184,134,11,0.12);
            --separator: #ddd4be; --card-shadow: 0 2px 14px rgba(140,105,20,0.08);
        }

        /* ===== CYRILLIC THEME — Molchat Doma ===== */
        body.theme-cyrillic {
            --bg: #0c0c0c; --bg-card: #151515; --bg-input: #1b1b1b;
            --text: #d8d4ce; --text-sub: #6e6a62; --text-muted: #48453f;
            --accent: #b33a3a; --accent-soft: rgba(179,58,58,0.16);
            --separator: #282624; --card-radius: 3px;
            --card-shadow: none;
            --font-ui: 'Jost', -apple-system, sans-serif;
            --letter-size: 2.2rem;
            background: var(--bg); color: var(--text); font-family: var(--font-ui);
        }
        body.theme-cyrillic::after {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 10000; opacity: 0.45; mix-blend-mode: overlay;
        }

        /* ===== IPA THEME — Academic ===== */
        body.theme-ipa {
            --bg: #faf6ee; --bg-card: #ffffff; --bg-input: #f0ebe0;
            --text: #2c2416; --text-sub: #6b5d4a; --text-muted: #a0927c;
            --accent: #5c4a2f; --accent-soft: rgba(92,74,47,0.10);
            --separator: #dcd4c2; --card-radius: 2px;
            --card-shadow: none;
            --font-ui: 'Cormorant Garamond', Georgia, serif;
            --letter-size: 2rem;
            background: var(--bg); color: var(--text); font-family: var(--font-ui);
        }

        /* ===== HEADER ===== */
        header {
            display: flex; align-items: center; padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
        }
        .back-btn {
            background: none; border: none; color: var(--text-sub);
            font-size: 1.2rem; cursor: pointer; padding: 20px; margin: -20px;
            text-decoration: none; display: flex; align-items: center;
            transition: color 0.4s;
        }

        /* ===== HERO ===== */
        .hero { text-align: center; padding: 10px 20px 20px; }
        .hero-title {
            font-family: var(--font-ui); font-size: clamp(2rem, 8vw, 3.2rem);
            font-weight: 700; color: var(--accent); line-height: 1.15;
            letter-spacing: -0.01em;
            transition: color 0.5s ease;
        }
        body.theme-cyrillic .hero-title {
            text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600;
        }
        body.theme-ipa .hero-title {
            font-style: italic; letter-spacing: 0.02em;
        }
        .hero-sub {
            font-family: var(--font-ui); font-size: 0.78rem; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);
            margin-top: 6px; transition: color 0.5s;
        }

        /* ===== MAIN TOGGLE ===== */
        .toggle-wrap { padding: 0 20px; margin-bottom: 6px; }
        .main-toggle {
            display: flex; padding: 3px; border-radius: var(--card-radius);
            border: 1px solid var(--separator); background: var(--bg-input);
            transition: all 0.5s ease;
        }
        .main-toggle .tab {
            flex: 1; background: none; border: none; padding: 11px 6px;
            font-family: var(--font-ui); font-size: 0.84rem; font-weight: 600;
            color: var(--text-sub); cursor: pointer;
            border-radius: calc(var(--card-radius) - 4px);
            transition: all 0.3s ease; white-space: nowrap;
        }
        .main-toggle .tab.active { background: var(--accent-soft); color: var(--accent); }

        /* ===== SUB TOGGLE ===== */
        .sub-wrap { padding: 0 20px; margin-bottom: 10px; min-height: 32px; }
        .sub-toggle {
            display: flex; gap: 6px; justify-content: center; padding: 6px 0;
            transition: opacity 0.3s;
        }
        .sub-toggle.hidden { display: none; }
        .sub-tab {
            background: none; border: 1px solid var(--separator); padding: 5px 12px;
            font-family: var(--font-ui); font-size: 0.68rem; font-weight: 500;
            color: var(--text-muted); cursor: pointer; border-radius: 20px;
            transition: all 0.25s; text-transform: uppercase; letter-spacing: 0.08em;
        }
        .sub-tab.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

        /* ===== DECORATIVE LINES ===== */
        .deco-greek, .deco-cyrillic, .deco-ipa { display: none; margin: 0 20px 14px; transition: opacity 0.5s; }
        body.theme-greek .deco-greek, body.theme-greek.ancient .deco-greek { display: block; }
        body.theme-cyrillic .deco-cyrillic { display: block; }
        body.theme-ipa .deco-ipa { display: block; }

        .deco-greek {
            height: 8px; opacity: 0.18;
            background: repeating-linear-gradient(90deg,
                var(--accent) 0 6px, transparent 6px 10px,
                var(--accent) 10px 12px, transparent 12px 18px);
        }
        .deco-cyrillic { height: 3px; background: var(--accent); opacity: 0.5; }
        .deco-ipa { height: 1px; background: var(--separator); }

        /* ===== TRANSLITERATION ===== */
        .translit-wrap { padding: 0 20px; margin-bottom: 16px; }
        .translit-wrap.hidden { display: none; }
        .translit-card {
            background: var(--bg-card); border: 1px solid var(--separator);
            border-radius: var(--card-radius); padding: 14px;
            display: flex; gap: 10px; align-items: stretch;
            box-shadow: var(--card-shadow); transition: all 0.5s ease;
        }
        .translit-half { flex: 1; display: flex; flex-direction: column; }
        .translit-half label {
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 5px;
        }
        .translit-half textarea {
            flex: 1; min-height: 56px; background: var(--bg-input);
            border: 1px solid var(--separator); border-radius: 8px;
            padding: 10px 11px; color: var(--text); font-family: var(--font-ui);
            font-size: 1.05rem; resize: none; outline: none;
            transition: border-color 0.2s, background-color 0.5s, color 0.5s;
            -webkit-appearance: none;
        }
        .translit-half textarea:focus { border-color: var(--accent); }
        .translit-arrow {
            display: flex; align-items: center; color: var(--text-muted);
            font-size: 1.1rem; user-select: none; padding: 0 2px;
        }

        /* ===== IPA PILL ===== */
        .pill-wrap { padding: 0 20px; margin-bottom: 12px; display: flex; justify-content: flex-end; }
        .pill-wrap.hidden { display: none; }
        .ipa-pill {
            background: var(--accent-soft); border: 1px solid var(--separator);
            padding: 4px 13px; font-family: var(--font-ui); font-size: 0.70rem;
            font-weight: 600; color: var(--text-sub); cursor: pointer;
            border-radius: 20px; transition: all 0.25s; letter-spacing: 0.03em;
        }
        .ipa-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* ===== SEARCH ===== */
        .search-wrap { padding: 0 20px; margin-bottom: 14px; }
        .search-input {
            width: 100%; background: var(--bg-input); border: 1px solid var(--separator);
            border-radius: var(--card-radius); padding: 11px 14px;
            color: var(--text); font-family: var(--font-ui); font-size: 0.88rem;
            outline: none; transition: border-color 0.2s, background-color 0.5s;
            -webkit-appearance: none;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--text-muted); }

        /* ===== LETTER GRID ===== */
        .grid-wrap { padding: 0 20px 40px; }
        .letter-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
            gap: 10px;
        }
        .letter-card {
            background: var(--bg-card); border: 1px solid var(--separator);
            border-radius: var(--card-radius); padding: 14px 10px;
            text-align: center; cursor: pointer; position: relative;
            box-shadow: var(--card-shadow);
            transition: all 0.5s ease, transform 0.15s ease;
        }
        .letter-card:active { transform: scale(0.96); }
        .letter-card.hidden { display: none; }

        /* Theme-specific card tweaks */
        body.theme-cyrillic .letter-card {
            border-left: 3px solid var(--accent); border-radius: 2px;
            padding: 12px 10px;
        }
        body.theme-ipa .letter-card {
            border: none; border-bottom: 1px solid var(--separator);
            border-radius: 0; padding: 12px 8px;
        }

        .letter-char {
            font-size: var(--letter-size); font-weight: 700; color: var(--accent);
            line-height: 1.15; margin-bottom: 4px; transition: color 0.5s;
        }
        .letter-lower {
            font-size: 0.78rem; color: var(--text-sub); margin-bottom: 6px;
            font-weight: 400;
        }
        .letter-name {
            font-size: 0.70rem; font-weight: 600; color: var(--text);
            text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px;
        }
        .letter-latin {
            font-size: 0.80rem; color: var(--text-sub); margin-bottom: 2px;
        }
        .letter-sound {
            font-size: 0.68rem; color: var(--text-muted); font-style: italic;
            line-height: 1.3;
        }
        .letter-ipa-tag {
            font-size: 0.72rem; color: var(--accent); margin-top: 5px;
            opacity: 0; max-height: 0; overflow: hidden;
            transition: all 0.3s ease;
        }
        body.show-ipa .letter-ipa-tag { opacity: 1; max-height: 28px; }

        /* ===== IPA CHART (IPA mode only) ===== */
        .ipa-chart-wrap { padding: 0 20px 40px; display: none; }
        body.theme-ipa .ipa-chart-wrap { display: block; }
        body.theme-ipa .grid-wrap { display: none; }

        .ipa-cat-title {
            font-family: var(--font-ui); font-size: 1.15rem; font-weight: 600;
            color: var(--text); margin: 20px 0 10px; padding-bottom: 5px;
            border-bottom: 2px solid var(--accent);
        }
        .ipa-cat-title:first-child { margin-top: 0; }
        .ipa-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
            gap: 8px; margin-bottom: 8px;
        }
        .ipa-cell {
            background: var(--bg-card); border: 1px solid var(--separator);
            border-radius: var(--card-radius); padding: 10px 8px;
            text-align: center; cursor: pointer;
            transition: all 0.3s ease, transform 0.15s ease;
        }
        .ipa-cell:active { transform: scale(0.96); }
        .ipa-cell.hidden { display: none; }
        .ipa-sym {
            font-size: 1.6rem; font-weight: 700; color: var(--accent);
            line-height: 1.2; margin-bottom: 3px;
        }
        .ipa-desc { font-size: 0.64rem; color: var(--text-sub); font-style: italic; }
        .ipa-ex { font-size: 0.62rem; color: var(--text-muted); margin-top: 2px; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text); color: var(--bg);
            padding: 10px 22px; border-radius: 8px;
            font-weight: 500; font-size: 0.88rem; z-index: 100001;
            transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            pointer-events: none; white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 400px) {
            .letter-grid { grid-template-columns: repeat(2, 1fr); }
            .ipa-grid { grid-template-columns: repeat(2, 1fr); }
            .main-toggle .tab { font-size: 0.78rem; padding: 10px 4px; }
        }
    </style>
</head>

<body class="theme-greek">

    <header>
        <a href="index.html" class="back-btn">&larr;</a>
    </header>

    <!-- HERO -->
    <div class="hero">
        <div class="hero-title" id="heroTitle">Αλφάβητο</div>
        <div class="hero-sub" id="heroSub">Modern Greek — 24 letters</div>
    </div>

    <!-- MAIN TOGGLE -->
    <div class="toggle-wrap">
        <div class="main-toggle" id="mainToggle">
            <button class="tab active" data-mode="greek" onclick="setMode('greek')">Ελληνικά</button>
            <button class="tab" data-mode="cyrillic" onclick="setMode('cyrillic')">Кириллица</button>
            <button class="tab" data-mode="ipa" onclick="setMode('ipa')">IPA</button>
        </div>
    </div>

    <!-- SUB TOGGLE -->
    <div class="sub-wrap">
        <div class="sub-toggle" id="subGreek">
            <button class="sub-tab active" data-sub="modern" onclick="setSub('modern')">Modern</button>
            <button class="sub-tab" data-sub="ancient" onclick="setSub('ancient')">Ancient</button>
        </div>
        <div class="sub-toggle hidden" id="subCyrillic">
            <button class="sub-tab active" data-sub="russian" onclick="setSub('russian')">Russian</button>
            <button class="sub-tab" data-sub="ukrainian" onclick="setSub('ukrainian')">Ukrainian</button>
            <button class="sub-tab" data-sub="serbian" onclick="setSub('serbian')">Serbian</button>
        </div>
    </div>

    <!-- DECORATIVE -->
    <div class="deco-greek"></div>
    <div class="deco-cyrillic"></div>
    <div class="deco-ipa"></div>

    <!-- TRANSLITERATION -->
    <div class="translit-wrap" id="translitWrap">
        <div class="translit-card">
            <div class="translit-half">
                <label>Latin</label>
                <textarea id="latinBox" placeholder="Type here…"></textarea>
            </div>
            <div class="translit-arrow">⇄</div>
            <div class="translit-half">
                <label id="scriptLabel">Greek</label>
                <textarea id="scriptBox" placeholder="…or here"></textarea>
            </div>
        </div>
    </div>

    <!-- IPA PILL -->
    <div class="pill-wrap" id="pillWrap">
        <button class="ipa-pill" id="ipaPill" onclick="toggleShowIPA()">Show IPA</button>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap">
        <input type="text" class="search-input" id="searchBox" placeholder="Filter letters…"
            autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <!-- LETTER GRID -->
    <div class="grid-wrap" id="gridWrap">
        <div class="letter-grid" id="letterGrid"></div>
    </div>

    <!-- IPA CHART -->
    <div class="ipa-chart-wrap" id="ipaChartWrap"></div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

// ================================================================
//  STATE
// ================================================================
let mode = 'greek';        // 'greek' | 'cyrillic' | 'ipa'
let sub = 'modern';        // varies by mode
let showIPA = false;
let focusedInput = null;

const THEME_COLORS = {
    greek:   { modern: '#f0f5fa', ancient: '#f5f0e4' },
    cyrillic: { russian: '#0c0c0c', ukrainian: '#0c0c0c', serbian: '#0c0c0c' },
    ipa:     { _: '#faf6ee' },
};

// ================================================================
//  MODE / SUB-MODE
// ================================================================
function setMode(m) {
    mode = m;
    // Set default sub-mode
    if (m === 'greek')    sub = document.querySelector('#subGreek .sub-tab.active')?.dataset.sub || 'modern';
    if (m === 'cyrillic') sub = document.querySelector('#subCyrillic .sub-tab.active')?.dataset.sub || 'russian';
    if (m === 'ipa')      sub = '_';

    // Toggle tabs
    document.querySelectorAll('.main-toggle .tab').forEach(t =>
        t.classList.toggle('active', t.dataset.mode === m));

    // Show/hide sub-toggles
    document.getElementById('subGreek').classList.toggle('hidden', m !== 'greek');
    document.getElementById('subCyrillic').classList.toggle('hidden', m !== 'cyrillic');

    // Show/hide transliteration
    document.getElementById('translitWrap').classList.toggle('hidden', m === 'ipa');

    // Show/hide IPA pill (not needed in IPA mode)
    document.getElementById('pillWrap').classList.toggle('hidden', m === 'ipa');

    applyTheme();
    render();
    clearTranslit();
}

function setSub(s) {
    sub = s;
    const container = mode === 'greek' ? 'subGreek' : 'subCyrillic';
    document.querySelectorAll(`#${container} .sub-tab`).forEach(t =>
        t.classList.toggle('active', t.dataset.sub === s));

    applyTheme();
    render();
    clearTranslit();
}

function applyTheme() {
    const body = document.body;
    body.className = ''; // reset
    if (mode === 'greek') {
        body.classList.add('theme-greek');
        if (sub === 'ancient') body.classList.add('ancient');
    } else if (mode === 'cyrillic') {
        body.classList.add('theme-cyrillic');
    } else {
        body.classList.add('theme-ipa');
    }
    if (showIPA) body.classList.add('show-ipa');

    // Meta theme-color
    const colors = THEME_COLORS[mode];
    const col = colors[sub] || colors[Object.keys(colors)[0]];
    document.getElementById('metaTheme').setAttribute('content', col);
}

// ================================================================
//  RENDER
// ================================================================
function render() {
    if (mode === 'ipa') {
        renderIPAChart();
    } else {
        renderLetterGrid();
    }
    updateHero();
    updateScriptLabel();
    filterLetters(); // re-apply any active search
}

function updateHero() {
    const data = (mode === 'ipa')
        ? { hero: '/ˌaɪ piː ˈeɪ/', sub: 'International Phonetic Alphabet' }
        : ALPHA[mode][sub];
    document.getElementById('heroTitle').textContent = data.hero;
    document.getElementById('heroSub').textContent = data.sub;
}

function updateScriptLabel() {
    const data = (mode !== 'ipa') ? ALPHA[mode][sub] : null;
    document.getElementById('scriptLabel').textContent = data ? data.label : '';
}

function renderLetterGrid() {
    const data = ALPHA[mode][sub];
    const grid = document.getElementById('letterGrid');
    grid.innerHTML = data.letters.map((lt, idx) => `
        <div class="letter-card" data-idx="${idx}"
             data-search="${(lt.name + ' ' + lt.lat + ' ' + lt.snd).toLowerCase()}"
             onclick="copyChar('${lt.u}${lt.l.replace('/', '')}')">
            <div class="letter-char">${lt.u} ${lt.l}</div>
            <div class="letter-name">${lt.name}</div>
            <div class="letter-latin">${lt.lat}</div>
            <div class="letter-sound">${lt.snd}</div>
            <div class="letter-ipa-tag">${lt.ipa}</div>
        </div>
    `).join('');
}

function renderIPAChart() {
    const wrap = document.getElementById('ipaChartWrap');
    wrap.innerHTML = IPA_DATA.map(cat => `
        <div class="ipa-cat-title">${cat.title}</div>
        <div class="ipa-grid">
            ${cat.items.map(it => `
                <div class="ipa-cell"
                     data-search="${(it.desc + ' ' + it.ex).toLowerCase()}"
                     onclick="copyChar('${it.sym.replace(/'/g,"\\'")}')">
                    <div class="ipa-sym">${it.sym}</div>
                    <div class="ipa-desc">${it.desc}</div>
                    <div class="ipa-ex">${it.ex}</div>
                </div>
            `).join('')}
        </div>
    `).join('');
}

// ================================================================
//  TRANSLITERATION ENGINE
// ================================================================
function latinToScript(text) {
    const map = TRANSLIT[mode]?.[sub];
    if (!map) return text;

    let result = '';
    let i = 0;
    const lower = text.toLowerCase();

    while (i < text.length) {
        let matched = false;
        for (const [lat, scr] of map) {
            if (lower.startsWith(lat, i)) {
                // Preserve case of first character
                const isUpper = text[i] !== text[i].toLowerCase() && text[i] === text[i].toUpperCase();
                result += isUpper ? scr.toUpperCase() : scr;
                i += lat.length;
                matched = true;
                break;
            }
        }
        if (!matched) { result += text[i]; i++; }
    }

    // Fix Greek final sigma
    if (mode === 'greek') {
        result = result.replace(/σ(?=\s|[.,;:!?\-]|$)/g, 'ς');
    }
    return result;
}

function scriptToLatin(text) {
    const data = ALPHA[mode]?.[sub];
    if (!data) return text;

    // Build reverse map from letter data
    const rmap = {};
    for (const lt of data.letters) {
        // lowercase script char → latin
        if (lt.l.includes('/')) {
            for (const c of lt.l.split('/')) rmap[c] = lt.lat;
        } else {
            rmap[lt.l] = lt.lat;
        }
        rmap[lt.u] = lt.lat.charAt(0).toUpperCase() + lt.lat.slice(1);
    }

    let result = '';
    for (const ch of text) {
        result += rmap[ch] !== undefined ? rmap[ch] : ch;
    }
    return result;
}

// Wire up transliteration textareas
const latinBox = document.getElementById('latinBox');
const scriptBox = document.getElementById('scriptBox');

latinBox.addEventListener('focus', () => focusedInput = 'latin');
scriptBox.addEventListener('focus', () => focusedInput = 'script');

latinBox.addEventListener('input', () => {
    if (focusedInput === 'latin') {
        scriptBox.value = latinToScript(latinBox.value);
    }
});
scriptBox.addEventListener('input', () => {
    if (focusedInput === 'script') {
        latinBox.value = scriptToLatin(scriptBox.value);
    }
});

function clearTranslit() {
    latinBox.value = '';
    scriptBox.value = '';
}

// ================================================================
//  SEARCH / FILTER
// ================================================================
const searchBox = document.getElementById('searchBox');
searchBox.addEventListener('input', filterLetters);

function filterLetters() {
    const q = searchBox.value.trim().toLowerCase();

    if (mode === 'ipa') {
        // Filter IPA cells + hide empty categories
        const wrap = document.getElementById('ipaChartWrap');
        const titles = wrap.querySelectorAll('.ipa-cat-title');
        const grids = wrap.querySelectorAll('.ipa-grid');

        titles.forEach((title, idx) => {
            const grid = grids[idx];
            if (!grid) return;
            let anyVisible = false;
            grid.querySelectorAll('.ipa-cell').forEach(cell => {
                const match = !q || cell.dataset.search.includes(q);
                cell.classList.toggle('hidden', !match);
                if (match) anyVisible = true;
            });
            title.style.display = anyVisible ? '' : 'none';
            grid.style.display = anyVisible ? '' : 'none';
        });
    } else {
        document.querySelectorAll('.letter-card').forEach(card => {
            const match = !q || card.dataset.search.includes(q);
            card.classList.toggle('hidden', !match);
        });
    }
}

// ================================================================
//  IPA TOGGLE
// ================================================================
function toggleShowIPA() {
    showIPA = !showIPA;
    document.body.classList.toggle('show-ipa', showIPA);
    const pill = document.getElementById('ipaPill');
    pill.classList.toggle('active', showIPA);
    pill.textContent = showIPA ? 'Hide IPA' : 'Show IPA';
}

// ================================================================
//  COPY + TOAST
// ================================================================
function copyChar(chars) {
    navigator.clipboard.writeText(chars).then(() => {
        showToast(`Copied ${chars}`);
    }).catch(() => {
        showToast(`${chars}`);
    });
}

let toastTimer;
function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1600);
}

// ================================================================
//  INIT
// ================================================================
render();
</script>
